<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOS 12 Mathematik Bayern – Abitur Mindmap</title>
<script src="exam_images.js"></script>
<script src="sol_images.js"></script>
<script src="sol_precise.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --card: #181c27;
  --border: #252a38;
  --border2: #2e3448;
  --ana: #e8a838;
  --sto: #3ec9a7;
  --text: #e8ecf4;
  --muted: #6b7494;
  --dim: #3a4060;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* ── HEADER ── */
.site-header {
  position: relative; z-index: 10;
  padding: 24px 40px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); gap: 16px; flex-wrap: wrap;
}
.logo-main { font-family:'Instrument Serif',serif; font-size:1.6rem; color:var(--text); letter-spacing:-0.02em; line-height:1; }
.logo-sub { font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-top:2px; }
.header-pills { display:flex; gap:6px; flex-wrap:wrap; }
.pill { font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--border2); color:var(--muted); }
.pill.ana { border-color:rgba(232,168,56,0.4); color:var(--ana); background:rgba(232,168,56,0.06); }
.pill.sto { border-color:rgba(62,201,167,0.4); color:var(--sto); background:rgba(62,201,167,0.06); }
/* ── TIP ── */
.tip { position:relative; z-index:10; padding:8px 40px; background:var(--surface); border-bottom:1px solid var(--border); font-size:0.68rem; letter-spacing:0.05em; color:var(--muted); }
.tip span { color:var(--text); }
/* ── MAP ── */
#map { position:relative; width:100%; height:calc(100vh - 100px); min-height:600px; overflow:hidden; }
svg#lines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; overflow:visible; }
/* ── CENTER ── */
.node-center {
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  z-index:20; width:116px; height:116px; border-radius:50%;
  background:linear-gradient(135deg,#1e2438,#252d45);
  border:2px solid var(--border2);
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  box-shadow:0 0 0 8px rgba(255,255,255,0.02),0 16px 50px rgba(0,0,0,0.5);
}
.nc-title { font-family:'Instrument Serif',serif; font-size:1rem; color:var(--text); line-height:1.1; }
.nc-sub { font-size:0.52rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
/* ── BRANCH NODES ── */
.node-branch { position:absolute; z-index:15; transform:translate(-50%,-50%); cursor:grab; user-select:none; touch-action:none; }
.node-branch.dragging, .node-branch:active { cursor:grabbing; }
.nb-inner { padding:13px 20px; border-radius:40px; border:1.5px solid; font-family:'Instrument Serif',serif; font-size:1rem; text-align:center; transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); backdrop-filter:blur(8px); white-space:nowrap; pointer-events:none; }
.node-branch.ana .nb-inner { background:rgba(232,168,56,0.1); border-color:rgba(232,168,56,0.5); color:var(--ana); box-shadow:0 0 30px rgba(232,168,56,0.1); }
.node-branch.sto .nb-inner { background:rgba(62,201,167,0.1); border-color:rgba(62,201,167,0.5); color:var(--sto); box-shadow:0 0 30px rgba(62,201,167,0.1); }
.node-branch:hover .nb-inner { transform:scale(1.06); }
.node-branch.ana:hover .nb-inner { box-shadow:0 0 50px rgba(232,168,56,0.25); }
.node-branch.sto:hover .nb-inner { box-shadow:0 0 50px rgba(62,201,167,0.25); }
/* ── TOPIC NODES ── */
.node-topic { position:absolute; z-index:12; transform:translate(-50%,-50%); cursor:grab; user-select:none; touch-action:none; transition:all 0.2s ease; }
.node-topic.dragging, .node-topic:active { cursor:grabbing; }
.nt-inner { padding:9px 14px; border-radius:10px; border:1px solid var(--border2); background:var(--card); font-size:0.74rem; font-weight:600; letter-spacing:0.02em; text-align:center; min-width:128px; max-width:160px; line-height:1.3; transition:all 0.22s ease; box-shadow:0 4px 20px rgba(0,0,0,0.3); pointer-events:none; }
.node-topic.ana .nt-inner { color:rgba(232,168,56,0.9); border-color:rgba(232,168,56,0.25); }
.node-topic.sto .nt-inner { color:rgba(62,201,167,0.9); border-color:rgba(62,201,167,0.25); }
.node-topic:hover .nt-inner { transform:translateY(-3px); box-shadow:0 8px 30px rgba(0,0,0,0.4); }
.node-topic.ana:hover .nt-inner { border-color:rgba(232,168,56,0.6); background:rgba(232,168,56,0.08); }
.node-topic.sto:hover .nt-inner { border-color:rgba(62,201,167,0.6); background:rgba(62,201,167,0.08); }
.nt-count { font-size:0.56rem; font-weight:400; letter-spacing:0.07em; color:var(--muted); margin-top:4px; display:block; }
/* ── LINES ── */
.line-center { stroke:var(--dim); stroke-width:1.5; fill:none; opacity:0.6; }
.line-topic { stroke-width:1; fill:none; opacity:0.22; stroke-dasharray:4 3; }
.line-ana { stroke:var(--ana); }
.line-sto { stroke:var(--sto); }
/* ── PANEL ── */
#panel {
  position:fixed; right:0; top:0; bottom:0;
  width:min(560px,96vw);
  background:var(--surface); border-left:1px solid var(--border);
  z-index:500; transform:translateX(110%);
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  display:flex; flex-direction:column;
}
#panel.open { transform:translateX(0); }
.panel-head { padding:20px 24px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.panel-nav { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.btn { font-family:'Syne',sans-serif; font-size:0.65rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:5px 12px; border-radius:6px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.btn:hover { color:var(--text); border-color:var(--text); }
.btn-close { margin-left:auto; }
.panel-accent { height:2px; border-radius:2px; margin-bottom:10px; }
.panel-accent.ana { background:linear-gradient(90deg,var(--ana),transparent); }
.panel-accent.sto { background:linear-gradient(90deg,var(--sto),transparent); }
.panel-title { font-family:'Instrument Serif',serif; font-size:1.3rem; color:var(--text); line-height:1.2; }
.panel-bread { font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
.panel-body { flex:1; overflow-y:auto; padding:18px 24px 32px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
/* ── TOPIC VIEW ── */
.topic-intro { font-size:0.75rem; color:var(--muted); margin-bottom:16px; line-height:1.6; }
.year-section { margin-bottom:4px; }
.year-header {
  font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted); padding:12px 0 6px;
  border-bottom:1px solid var(--border); margin-bottom:8px;
}
.year-header:first-child { padding-top:0; }
.exam-card {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:8px; cursor:pointer; transition:all 0.2s;
  position:relative; overflow:hidden;
}
.exam-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; border-radius:2px 0 0 2px;
}
.exam-card.ana::before { background:var(--ana); }
.exam-card.sto::before { background:var(--sto); }
.exam-card:hover { border-color:var(--border2); transform:translateX(4px); background:#1e2336; }
.ec-label { font-family:'Instrument Serif',serif; font-size:1rem; color:var(--text); line-height:1.3; }
.ec-sub { font-size:0.65rem; color:var(--muted); margin-top:5px; }
.ec-arrow { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1rem; }
/* ── EXAM VIEW ── */
.exam-view-header {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px; margin-bottom:14px;
}
.ev-year { font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.ev-title { font-family:'Instrument Serif',serif; font-size:1.05rem; color:var(--text); line-height:1.3; }
.ev-topic { font-size:0.65rem; color:var(--muted); margin-top:4px; }
.page-images { margin-bottom:14px; }
.page-img {
  width:100%; border-radius:8px; margin-bottom:8px;
  border:1px solid var(--border); display:block;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.solution-toggle {
  width:100%; padding:12px 18px;
  background:transparent; border:1.5px solid;
  border-radius:8px; cursor:pointer;
  font-family:'Syne',sans-serif; font-size:0.75rem;
  font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
  transition:all 0.2s; margin-bottom:12px;
}
.solution-toggle.ana { border-color:rgba(232,168,56,0.5); color:var(--ana); }
.solution-toggle.sto { border-color:rgba(62,201,167,0.5); color:var(--sto); }
.solution-toggle.ana:hover { background:rgba(232,168,56,0.1); }
.solution-toggle.sto:hover { background:rgba(62,201,167,0.1); }
.solution-box { display:none; }
.solution-box.open { display:block; }
.sol-label { font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:14px; }
.sol-step { display:flex; gap:12px; margin-bottom:12px; align-items:flex-start; }
.sol-n { width:22px; height:22px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.62rem; font-weight:700; margin-top:1px; }
.sol-n.ana { background:rgba(232,168,56,0.15); color:var(--ana); border:1px solid rgba(232,168,56,0.3); }
.sol-n.sto { background:rgba(62,201,167,0.15); color:var(--sto); border:1px solid rgba(62,201,167,0.3); }
.sol-text { font-size:0.82rem; line-height:1.75; color:#b0b8d0; white-space:pre-wrap; }
.result-box { border-radius:8px; padding:12px 16px; margin-top:14px; font-family:'Instrument Serif',serif; font-size:0.93rem; line-height:1.5; }
.result-box.ana { background:rgba(232,168,56,0.08); border:1px solid rgba(232,168,56,0.25); color:var(--ana); }
.result-box.sto { background:rgba(62,201,167,0.08); border:1px solid rgba(62,201,167,0.25); color:var(--sto); }
.result-box::before { content:'Ergebnis'; font-family:'Syne',sans-serif; font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.6; display:block; margin-bottom:4px; }
/* ── OVERLAY ── */
#overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:400; opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(2px); }
#overlay.on { opacity:1; pointer-events:all; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.anim { animation:fadeUp 0.28s ease forwards; }

/* ── VIDEO BUTTON ── */
.video-btn {
  display:flex; align-items:center; gap:10px;
  background: linear-gradient(135deg, rgba(255,60,60,0.12), rgba(255,60,60,0.06));
  border:1px solid rgba(255,80,80,0.35);
  border-radius:10px; padding:12px 16px; margin-bottom:8px;
  color:#ff8080; text-decoration:none; font-size:0.8rem; font-weight:600;
  letter-spacing:0.04em; transition:all 0.2s; flex:1;
}
.video-btn:hover { background:rgba(255,60,60,0.2); border-color:rgba(255,80,80,0.6); transform:translateX(3px); }
.vbtn-icon { font-size:1rem; background:rgba(255,60,60,0.25); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.vbtn-ext { margin-left:auto; opacity:0.5; font-size:0.7rem; }

/* ── PDF BUTTON ── */
.pdf-btn {
  display:flex; align-items:center; gap:10px;
  background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(79,142,247,0.06));
  border:1px solid rgba(79,142,247,0.35);
  border-radius:10px; padding:12px 16px; margin-bottom:8px;
  color:#8ab8ff; text-decoration:none; font-size:0.8rem; font-weight:600;
  letter-spacing:0.04em; transition:all 0.2s; flex:1;
}
.pdf-btn:hover { background:rgba(79,142,247,0.2); border-color:rgba(79,142,247,0.6); transform:translateX(3px); }
.pbtn-icon { font-size:1rem; background:rgba(79,142,247,0.25); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* ── ACTION ROW ── */
.action-row { display:flex; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.action-row .video-btn, .action-row .pdf-btn { margin-bottom:0; }

/* ── YEAR OVERVIEW PANEL ── */
.year-overview { margin-bottom:20px; }
.year-ov-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:16px 18px; margin-bottom:10px;
}
.year-ov-title { font-family:'Instrument Serif',serif; font-size:1.1rem; color:var(--text); margin-bottom:8px; }
.year-ov-links { display:flex; gap:8px; flex-wrap:wrap; }
.year-ov-pdf {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(79,142,247,0.1); border:1px solid rgba(79,142,247,0.3);
  border-radius:6px; padding:5px 12px;
  color:#8ab8ff; text-decoration:none; font-size:0.72rem; font-weight:600;
  letter-spacing:0.06em; transition:all 0.2s;
}
.year-ov-pdf:hover { background:rgba(79,142,247,0.2); border-color:rgba(79,142,247,0.6); }
.year-ov-vid {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(255,60,60,0.1); border:1px solid rgba(255,80,80,0.3);
  border-radius:6px; padding:5px 12px;
  color:#ff8080; text-decoration:none; font-size:0.72rem; font-weight:600;
  letter-spacing:0.06em; transition:all 0.2s;
}
.year-ov-vid:hover { background:rgba(255,60,60,0.2); }

/* ── NO IMG BOX ── */
.no-img-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; color:var(--muted); font-size:0.78rem; text-align:center; }

/* ── SOLUTION IMAGES ── */
.sol-images { margin-bottom:8px; }
@media(max-width:600px){
  .site-header{padding:16px 20px 14px}
  .tip{padding:7px 20px}
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="logo-main">Mathematik FOS 12</div>
    <div class="logo-sub">Bayern · Nichttechnik · Abitur Mindmap</div>
  </div>
  <div class="header-pills">
    <div class="pill">2020</div><div class="pill">2021</div><div class="pill">2022</div>
    <div class="pill">2023</div><div class="pill">2024</div><div class="pill">2025</div>
    <div class="pill ana">Analysis</div><div class="pill sto">Stochastik</div>
  </div>
</header>

<div class="tip">
  <span>💡 Klick</span> auf Thema → Aufgaben wählen → Original-Abituraufgabe sehen → Lösung aufklappen · <span>Ziehen</span> verschiebt Elemente · <span>Mitte</span> = alle PDFs
</div>

<div id="map">
  <svg id="lines"></svg>
  <div class="node-center" onclick="openYearOverview()" style="cursor:pointer">
    <div class="nc-title">Mathe<br>FOS 12</div>
    <div class="nc-sub" style="font-size:0.5rem">📚 Alle PDFs</div>
  </div>
</div>

<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="panel-head">
    <div class="panel-nav">
      <button class="btn" id="btn-back" onclick="goBack()" style="display:none">← Zurück</button>
      <button class="btn btn-close" onclick="closePanel()">✕ Schließen</button>
    </div>
    <div class="panel-accent" id="p-accent"></div>
    <div class="panel-title" id="p-title"></div>
    <div class="panel-bread" id="p-bread"></div>
  </div>
  <div class="panel-body" id="p-body"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  DATENSTRUKTUR – Themen & Prüfungszuordnung
//  Jede Aufgabe verweist auf einen IMAGE_KEY aus exam_images.js
//  und enthält eine optionale Schritt-für-Schritt Lösung
// ══════════════════════════════════════════════════════════════

const TREE = [
  {
    id:'ana', label:'Analysis', cls:'ana', angle:-150, dist:230,
    topics: [
      {
        id:'ana-kurve', label:'Kurvendiskussion\nganzrat. Fkt.',
        desc:'Globalverhalten, Symmetrie, Nullstellen, HoP/TiP/TeP, Wendepunkte, Monotonie',
        exams: [
          { year:'2025', section:'Teil 2 – Analysis II', imgKey:'2025_t2_analysis2',
            title:'f(x)=–⅛(x⁴–6x²+8x) – vollst. Kurvendiskussion', pts:'26 BE',
            steps:[
              `Globalverhalten: führender Term –⅛x⁴\nx→±∞: f(x)→–∞`,
              `f'(x)=–½(x³–3x+2)=–½(x–1)²(x+2)=0\n→ x₁=1 (doppelt), x₂=–2`,
              `f''(x)=–½(3x²–3)\nf''(1)=0 → Terrassenpunkt T(1|–3/8)\nf''(–2)=–4,5<0 → Hochpunkt H(–2|3)`,
              `Wendepunkte: f''(x)=0 → x=±1\nW₁(1|–3/8), W₂(–1|13/8)\nProbe: Gerade g(x)=–x+5/8 geht durch beide ✓`,
              `Fläche [–1;1] zw. Gf und Gg:\nA=[x⁵/40–x³/4+7x²/16+5x/8]₋₁¹ = 5/4`
            ],
            result:'T(1|–3/8) · H(–2|3) · W₁(1|–3/8) · W₂(–1|13/8) · Fläche=1,25 FE'
          },
          { year:'2024', section:'Teil 2 – Analysis I', imgKey:'2024_t2_analysis1', solKey:'sol_2024_t2_ana1_extrem',
            title:'f(x)=–½x⁴–2x³–2x² – Extrempunkte & Fläche', pts:'24 BE',
            steps:[
              `f(x)=–½x²(x+2)² → Nullstellen: x=0 (2-fach), x=–2 (2-fach)`,
              `f'(x)=–2x(x+1)(x+2)=0 → x=0,–1,–2\nf''(0)=–4<0 → H(0|0)\nf''(–1)=2>0 → T(–1|–½)\nf''(–2)=–4<0 → H(–2|0)`,
              `Parabel p mit S(–1|–1,5) durch A(–3|–4,5), B(1|–4,5):\na=–¾ → p(x)=–¾x²–3/2x–9/4`,
              `A=∫₋₃¹(f–p)dx=[–x⁵/10–x⁴/2–5x³/12+3x²/4+9x/4]₋₃¹=32/5`
            ],
            result:'H(0|0) · T(–1|–½) · H(–2|0) · Fläche=32/5=6,4 FE'
          },
          { year:'2022', section:'Teil 2 – Analysis I', imgKey:'2022_t2_analysis1',
            title:'f(x)=–⅛x⁴+2x² – Kurvendiskussion & Wolfsrudel', pts:'43 BE',
            steps:[
              `f'(x)=–½x³+4x=–½x(x²–8)=0 → x=0, x=±2√2`,
              `f''(x)=–3/2x²+4\nf''(0)=4>0 → T(0|0)\nf''(±2√2)=–8<0 → H(±2√2|4)`,
              `Wendestellen: f''=0 → x=±√(8/3)=±2√6/3`,
              `Tangente an x=–2: f'(–2)=4–8·(–½)... [s. Originalaufgabe]`,
              `Wolfsrudel N(t)=4·e^(0,301t)\nFür N=440: t=ln(110)/0,301≈15,6 Jahre → ca. 2024`
            ],
            result:'H(±2√2|4) · T(0|0) · Wendestellen ±2√6/3 · Wolfsrudel 440 ca. 2024'
          },
          { year:'2021', section:'Teil 1 – Analysis', imgKey:'2021_t1_analysis', solKey:'sol_2021_t1_ana_ganzrat',
            title:'Ganzrationale Funktion 4. Grades aus Graph ablesen', pts:'12 BE',
            steps:[
              `Nullstellen aus Graph: x=–3 (einfach), x=–2 (einfach), x=1 (doppelt)\n→ f(x)=a(x+3)(x+2)(x–1)²`,
              `Leitkoeffizient a aus Bedingung bestimmen:\nf(x)=–¼(x⁴+5x³+6x²–4x–8) [laut Angabe]`,
              `Fläche im I. Quadranten: Nullstellen x=0 bis x=1\nA=∫₀¹f(x)dx=[–x⁵/20–x⁴/16–x³/6+x²/8+2x]₀¹`
            ],
            result:'f(x)=–¼(x⁴+5x³+6x²–4x–8) · Fläche I. Quadrant aus Integration'

// Get video key from exam section string
function getVideoKey(section, year) {
  const s = section.toLowerCase();
  if (s.includes('teil 1')) return 't1';
  if (s.includes('analysis i') || s.includes('analysis i ')) return 't2_analysis1';
  if (s.includes('analysis ii') || s.includes('analysis ii ')) return 't2_analysis2';
  if (s.includes('stochastik i') && !s.includes('ii')) return year==='2020' ? 't2_stochastik1' : 't2_stochastik';
  if (s.includes('stochastik ii')) return year==='2020' ? 't2_stochastik2' : 't2_stochastik';
  if (s.includes('stochastik')) return 't2_stochastik';
  return 't1';
}


let state = { view:'map', branch:null, topic:null };

function getCenter() {
  const m = document.getElementById('map');
  return { x: m.offsetWidth/2, y: m.offsetHeight/2 };
}

// Store nodes with their DOM element, position, and the line they're attached to
const nodes = [];
// Each node: {type:'center'|'branch'|'topic', el, x, y, parentNode, line, branch, topic}

function buildMap() {
  const map = document.getElementById('map');
  const svg = document.getElementById('lines');
  const c = getCenter();
  const w = map.offsetWidth;
  const h = map.offsetHeight;

  // Clear all
  document.querySelectorAll('.node-branch,.node-topic').forEach(n=>n.remove());
  svg.innerHTML='';
  nodes.length = 0;

  // Center node
  const centerEl = document.querySelector('.node-center');
  centerEl.style.left = c.x + 'px';
  centerEl.style.top = c.y + 'px';
  const centerNode = { type:'center', el:centerEl, x:c.x, y:c.y };
  nodes.push(centerNode);

  // ── STAR LAYOUT ──
  // Analysis on the left half, Stochastik on the right half.
  // The two branch nodes are placed slightly left/right of center,
  // and each branch's topics fan out in a wide half-circle around it.

  // Scale branch distance with viewport so nothing gets cut off
  const branchDist = Math.min(180, w * 0.18);
  const topicDist  = Math.min(230, Math.min(w, h) * 0.32);

  TREE.forEach((branch, bi) => {
    // Branch node: Analysis at 180° (left), Stochastik at 0° (right)
    const branchAngle = (bi === 0) ? 180 : 0;
    const bRad = branchAngle * Math.PI / 180;
    const bx = c.x + Math.cos(bRad) * branchDist;
    const by = c.y;

    // Line from center to branch
    const centerLine = document.createElementNS('http://www.w3.org/2000/svg','line');
    centerLine.setAttribute('class','line-center');
    svg.appendChild(centerLine);

    // Branch DOM
    const bn = document.createElement('div');
    bn.className = `node-branch ${branch.cls}`;
    bn.innerHTML = `<div class="nb-inner">${branch.label.replace('\n','<br>')}</div>`;
    map.appendChild(bn);

    const branchNode = {
      type:'branch', el:bn, x:bx, y:by,
      parentNode: centerNode, line: centerLine,
      branch
    };
    nodes.push(branchNode);
    attachInteractions(bn, branchNode, ()=>openBranch(branch));

    // ── Topics in a half-circle around the branch ──
    // Analysis (left branch): topics fan from 90° (top) through 180° (far left) to 270° (bottom)
    // Stochastik (right branch): topics fan from 270° (bottom) through 0° (far right) to 90° (top)
    //   — we use the range that points AWAY from the center.
    const n = branch.topics.length;
    // Full fan angle: how wide the half-circle opens.
    const fanAngle = 180; // 180° = perfect half-circle on the outward side
    // Start angle is branchAngle - fanAngle/2
    const startAng = branchAngle - fanAngle/2;
    // Angular step between topics (with padding so first and last don't touch the vertical axis)
    const step = n > 1 ? fanAngle / (n - 1) : 0;

    branch.topics.forEach((topic, ti) => {
      const angDeg = (n === 1) ? branchAngle : startAng + ti * step;
      const angRad = angDeg * Math.PI / 180;
      let tx = bx + Math.cos(angRad) * topicDist;
      let ty = by + Math.sin(angRad) * topicDist;

      // Clamp to viewport with padding
      const pad = 95;
      tx = Math.max(pad, Math.min(tx, w - pad));
      ty = Math.max(40, Math.min(ty, h - 40));

      const topicLine = document.createElementNS('http://www.w3.org/2000/svg','line');
      topicLine.setAttribute('class',`line-topic line-${branch.cls}`);
      svg.appendChild(topicLine);

      const tn = document.createElement('div');
      tn.className = `node-topic ${branch.cls}`;
      tn.innerHTML = `<div class="nt-inner">${topic.label.replace('\n','<br>')}
        <span class="nt-count">${topic.exams.length} Prüfungen</span></div>`;
      map.appendChild(tn);

      const topicNode = {
        type:'topic', el:tn, x:tx, y:ty,
        parentNode: branchNode, line: topicLine,
        branch, topic
      };
      nodes.push(topicNode);
      attachInteractions(tn, topicNode, ()=>openTopic(branch, topic));
    });
  });

  // Initial render of positions + lines
  renderAll();
}

// Update DOM positions from node state + redraw SVG lines
function renderAll() {
  nodes.forEach(node => {
    if (node.el) {
      node.el.style.left = node.x + 'px';
      node.el.style.top  = node.y + 'px';
    }
    if (node.line && node.parentNode) {
      node.line.setAttribute('x1', node.parentNode.x);
      node.line.setAttribute('y1', node.parentNode.y);
      node.line.setAttribute('x2', node.x);
      node.line.setAttribute('y2', node.y);
    }
  });
}

// ── DRAG + CLICK interaction ──
// Distinguish a click (< 5px movement) from a drag.
// On drag: update node.x/y, re-render lines, never fire click handler.
// On click: fire the onClick callback (open panel).
function attachInteractions(el, node, onClick) {
  let isDragging = false;
  let moved = false;
  let startX = 0, startY = 0;
  let origX = 0, origY = 0;

  const onPointerDown = (ev) => {
    // Only left-button / primary pointer
    if (ev.button !== undefined && ev.button !== 0) return;
    isDragging = true;
    moved = false;
    const p = getPointer(ev);
    startX = p.x; startY = p.y;
    origX = node.x; origY = node.y;
    el.style.zIndex = 999;
    el.style.transition = 'none'; // disable CSS transitions while dragging
    // Capture pointer so we keep receiving events
    if (el.setPointerCapture && ev.pointerId !== undefined) {
      try { el.setPointerCapture(ev.pointerId); } catch(e){}
    }
    ev.preventDefault();
  };

  const onPointerMove = (ev) => {
    if (!isDragging) return;
    const p = getPointer(ev);
    const dx = p.x - startX;
    const dy = p.y - startY;
    if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      moved = true;
      el.classList.add('dragging');
    }
    if (moved) {
      const map = document.getElementById('map');
      const w = map.offsetWidth, h = map.offsetHeight;
      // Keep node inside the map area
      node.x = Math.max(20, Math.min(origX + dx, w - 20));
      node.y = Math.max(20, Math.min(origY + dy, h - 20));
      renderAll();
    }
  };

  const onPointerUp = (ev) => {
    if (!isDragging) return;
    isDragging = false;
    el.style.zIndex = '';
    el.style.transition = '';
    el.classList.remove('dragging');
    if (el.releasePointerCapture && ev.pointerId !== undefined) {
      try { el.releasePointerCapture(ev.pointerId); } catch(e){}
    }
    // If the node didn't move, treat it as a click
    if (!moved && onClick) {
      onClick();
    }
    moved = false;
  };

  // Use pointer events for unified mouse+touch handling
  el.addEventListener('pointerdown', onPointerDown);
  el.addEventListener('pointermove', onPointerMove);
  el.addEventListener('pointerup', onPointerUp);
  el.addEventListener('pointercancel', onPointerUp);
}

function getPointer(ev) {
  if (ev.touches && ev.touches[0]) return { x: ev.touches[0].clientX, y: ev.touches[0].clientY };
  return { x: ev.clientX, y: ev.clientY };
}

function setPH(title,bread,cls){
  document.getElementById('p-title').textContent=title;
  document.getElementById('p-bread').textContent=bread;
  document.getElementById('p-accent').className=`panel-accent ${cls}`;
}

function openBranch(branch){
  state={view:'branch',branch,topic:null};
  setPH(branch.label.replace('\n',' '),'Mathematik FOS 12',branch.cls);
  document.getElementById('btn-back').style.display='none';
  let html='';

    t.exams.forEach(e=>{
      html+=examCard(e,branch,t);
    });
  });

  openPanel();
}

function openTopic(branch,topic){
  state={view:'topic',branch,topic};
  setPH(topic.label.replace('\n',' '),branch.label.replace('\n',' '),branch.cls);
  document.getElementById('btn-back').style.display='none';
  let html=`<p class="topic-intro">${topic.desc}</p>`;
  const years=['2025','2024','2023','2022','2021','2020'];
  years.forEach(yr=>{
    const exs=topic.exams.filter(e=>e.year===yr);
    if(!exs.length)return;
    html+=`<div class="year-header">Abitur ${yr}</div>`;
    exs.forEach(e=>{ html+=examCard(e,branch,topic); });
  });
  document.getElementById('p-body').innerHTML=html;
  openPanel();
}

function examCard(e,branch,topic){
  const key=JSON.stringify({bid:branch.id,tid:topic.id,ey:e.year});
  return `<div class="exam-card ${branch.cls} anim" onclick='openExam(${JSON.stringify(key)})'>
    <div class="ec-label">${e.title}</div>
    <div class="ec-sub">${e.section} · ${e.pts}</div>
    <span class="ec-arrow">→</span>
  </div>`;
}

function openExam(keyStr){
  const {bid,tid,ey}=JSON.parse(keyStr);
  const branch=TREE.find(b=>b.id===bid);
  const topic=branch.topics.find(t=>t.id===tid);
  const exam=topic.exams.find(e=>e.year===ey);

  state={view:'exam',branch,topic,exam};
  setPH(exam.title, `${exam.year} · ${exam.section}`, branch.cls);
  document.getElementById('btn-back').style.display='flex';

  // ── Aufgaben-Bilder ──
  const imgs = (typeof EXAM_IMAGES !== 'undefined' && EXAM_IMAGES[exam.imgKey]) || [];
  const imgHTML = imgs.length
    ? `<div class="page-images">${imgs.map(src=>`<img class="page-img" src="${src}" loading="lazy">`).join('')}</div>`
    : `<div class="no-img-box">📄 ${exam.year} – ${exam.section}</div>`;

  // ── Video-Button ──
  const vkey = getVideoKey(exam.section, exam.year);
  const vidEntry = VIDEOS[exam.year] && VIDEOS[exam.year][vkey];
  const videoBtn = vidEntry
    ? `<a class="video-btn" href="${vidEntry.url}" target="_blank" rel="noopener">
         <span class="vbtn-icon">▶</span>
         <span>Lösungsvideo – ${vidEntry.label}</span>
         <span class="vbtn-ext">↗</span>
       </a>`
    : '';

  // ── PDF-Link ──
  const pdfEntry = PDF_LINKS[exam.year];
  const pdfUrl = pdfEntry && (pdfEntry.combined || pdfEntry.aufgaben);
  const pdfBtn = pdfUrl
    ? `<a class="pdf-btn" href="${pdfUrl}" target="_blank" rel="noopener">
         <span class="pbtn-icon">📄</span>
         <span>Original PDF – ${pdfEntry.label}</span>
         <span class="vbtn-ext">↗</span>
       </a>`
    : '';

  // ── Lösung bestimmen: SOL_PRECISE > SOL_IMAGES > typed steps ──
  const preciseKey = exam.solKey;
  const preciseImgs = (typeof SOL_PRECISE !== 'undefined' && preciseKey && SOL_PRECISE[preciseKey]) || [];
  const sectionImgKey = SOL_KEY_MAP[exam.imgKey];
  const sectionImgs = (typeof SOL_IMAGES !== 'undefined' && sectionImgKey && SOL_IMAGES[sectionImgKey]) || [];

  let solutionContent = '';
  let solLabel = '';

  if (preciseImgs.length) {
    // Best: exact task solution pages from PDF
    solLabel = `Lösung (Original PDF ${exam.year})`;
    solutionContent = `<div class="sol-images">${preciseImgs.map(s=>`<img class="page-img" src="${s}" loading="lazy">`).join('')}</div>`;
  } else if (sectionImgs.length) {
    // OK: full section solution
    solLabel = `Lösung ${exam.year} – ${exam.section}`;
    solutionContent = `<div class="sol-images">${sectionImgs.map(s=>`<img class="page-img" src="${s}" loading="lazy">`).join('')}</div>`;
  } else {
    // Fallback: typed steps
    solLabel = 'Schritt-für-Schritt Lösung';
    const stepsHTML = exam.steps.map((s,i)=>`
      <div class="sol-step">
        <div class="sol-n ${branch.cls}">${i+1}</div>
        <div class="sol-text">${s}</div>
      </div>`).join('');
    solutionContent = `${stepsHTML}<div class="result-box ${branch.cls}">${exam.result}</div>`;
  }

  document.getElementById('p-body').innerHTML=`
    <div class="exam-view-header anim">
      <div class="ev-year">Fachabitur Bayern ${exam.year} – Nichttechnik</div>
      <div class="ev-title">${exam.title}</div>
      <div class="ev-topic">${exam.section} · ${exam.pts}</div>
    </div>
    <div class="action-row">
      ${videoBtn}${pdfBtn}
    </div>
    ${imgHTML}
    <button class="solution-toggle ${branch.cls}" onclick="toggleSolution(this)">
      ▶ ${solLabel}
    </button>
    <div class="solution-box">
      <div class="sol-label">${solLabel}</div>
      ${solutionContent}
    </div>`;
}

function toggleSolution(btn){
  const box=btn.nextElementSibling;
  box.classList.toggle('open');
  btn.textContent=box.classList.contains('open') ? '▼ Lösung ausblenden' : '▶ Lösung anzeigen';
}

  buildMap();
  // Only rebuild on large resize events; otherwise users lose their arrangement
  let lastW = window.innerWidth, lastH = window.innerHeight;
  window.addEventListener('resize', ()=>{
    if (Math.abs(window.innerWidth - lastW) > 150 || Math.abs(window.innerHeight - lastH) > 150) {
      lastW = window.innerWidth; lastH = window.innerHeight;
      buildMap();
    }
  });
});
</script>
</body>
</html>
